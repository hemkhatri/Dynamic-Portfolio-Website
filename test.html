<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Random Places</title>
    <style>
        /* Clean, modern styling for your portfolio layout */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .nepal-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 400px;
            width: 90%;
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .nepal-card:hover {
            transform: translateY(-4px);
        }

        /* Container to make sure the random images look consistent */
        .image-container {
            width: 100%;
            height: 300px;
            background-color: #e0e0e0;
            position: relative;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-content {
            padding: 20px;
        }

        .location-tag {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e50;
            margin: 0 0 10px 0;
        }

        .credit-tag {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin: 0;
        }

        .credit-tag a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
        }

        .credit-tag a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- Card Component for your Portfolio -->
    <div class="nepal-card">
        <div class="image-container">
            <img id="nepal-image"
                src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='100' height='100' viewBox='0 0 100 100'></svg>"
                alt="Loading Nepal Photo...">
        </div>
        <div class="card-content">
            <h3 id="photo-location" class="location-tag">📍 Loading location...</h3>
            <p id="photo-credit" class="credit-tag">
                Photo by <a id="author-link" href="#" target="_blank">Loading...</a> on Unsplash
            </p>
        </div>
    </div>

    <script>
        // Replace this with your actual working Unsplash Access Key
        const ACCESS_KEY = 'LXXuon4scyeQfFzpSv45-kW266sO1PWsO76AEz5yfCA';

        async function fetchRandomNepalPhoto() {
            // FIXED: Target correct API URL, added query parameter, and fixed syntax (${ACCESS_KEY})
            const endpoint = `https://api.unsplash.com/photos/random?query=nepal&client_id=${ACCESS_KEY}`;

            try {
                const response = await fetch(endpoint);

                if (!response.ok) throw new Error('Network issue fetching photo');

                const data = await response.json();

                // 1. Inject Image Url
                document.getElementById('nepal-image').src = data.urls.regular;
                document.getElementById('nepal-image').alt = data.alt_description || "Random Nepal Snapshot";

                // 2. Extract Location Name
                const hasLocation = data.location && data.location.name;
                document.getElementById('photo-location').innerText = hasLocation ? `📍 ${data.location.name}` : "📍 Somewhere in Nepal";

                // 3. Extract Credits
                const authorLink = document.getElementById('author-link');
                authorLink.innerText = data.user.name;
                authorLink.href = `${data.user.links.html}?utm_source=your_portfolio_app&utm_medium=referral`;

            } catch (error) {
                console.error("Error setting image:", error);

                // FIXED: Fallback now points to an actual static image URL instead of the homepage URL
                document.getElementById('photo-location').innerText = "📍 Phewa Lake, Pokhara, Nepal";
                document.getElementById('nepal-image').src = "https://images.unsplash.com/photo-1544735716-392fe2489ffa?auto=format&fit=crop&w=500&q=80";
                document.getElementById('nepal-image').alt = "Phewa Lake, Pokhara";

                const authorLink = document.getElementById('author-link');
                authorLink.innerText = "Raimond Klavins";
                authorLink.href = "https://unsplash.com/@raimondklavins?utm_source=your_portfolio_app&utm_medium=referral";
            }
        }

        // Run the logic as soon as the user opens your page
        window.onload = fetchRandomNepalPhoto;
    </script>


</body>

</html>
